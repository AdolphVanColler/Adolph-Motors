<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Adolph Motors</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--white); border-radius: var(--radius-2xl); padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: var(--shadow-2xl); }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo .logo-icon { width: 56px; height: 56px; background: var(--accent); border-radius: var(--radius-lg); display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 1.8rem; font-weight: 800; margin-bottom: .75rem; }
    .login-logo h2 { font-size: 1.4rem; }
    .login-logo p { font-size: .875rem; color: var(--gray-500); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">A</div>
      <h2>Adolph Motors</h2>
      <p>Admin Panel — Sign In</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" class="form-control" id="loginUsername" required placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" class="form-control" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
          <button type="button" id="togglePw" style="position:absolute; right:.875rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--gray-400); cursor:pointer; font-size:1rem">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div id="loginAlert"></div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <div style="text-align:center; margin-top:1.5rem">
      <a href="/" style="font-size:.825rem; color:var(--gray-500)"><i class="bi bi-arrow-left"></i> Back to Website</a>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('adminToken')) {
      fetch('/api/auth/verify', { headers: { Authorization: 'Bearer ' + localStorage.getItem('adminToken') } })
        .then(r => r.json()).then(d => { if (d.valid) window.location.href = '/admin/dashboard.html'; });
    }

    document.getElementById('togglePw').addEventListener('click', function() {
      const pw = document.getElementById('loginPassword');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      this.innerHTML = pw.type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0 auto"></div>';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUsername').value.trim(),
            password: document.getElementById('loginPassword').value,
          }),
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminUser', JSON.stringify(data.admin));
          window.location.href = '/admin/dashboard.html';
        } else {
          document.getElementById('loginAlert').innerHTML = `<div class="alert alert-error"><i class="bi bi-exclamation-circle"></i>${data.error || 'Login failed'}</div>`;
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
        }
      } catch {
        document.getElementById('loginAlert').innerHTML = `<div class="alert alert-error"><i class="bi bi-wifi-off"></i>Connection error. Please try again.</div>`;
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
      }
    });
  </script>
</body>
</html>
