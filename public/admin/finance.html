<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Applications | Adolph Motors Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="admin-body">
<aside class="admin-sidebar" id="adminSidebar">
  <div class="admin-sidebar-header"><div class="logo nav-logo"><div class="logo-icon">A</div><div class="logo-text">Adolph Motors<span>Admin Panel</span></div></div></div>
  <nav class="admin-nav">
    <div class="admin-nav-section">Main</div>
    <a href="/admin/dashboard.html" class="admin-nav-item"><i class="bi bi-grid-1x2"></i> Dashboard</a>
    <a href="/admin/cars.html" class="admin-nav-item"><i class="bi bi-car-front"></i> Inventory</a>
    <div class="admin-nav-section">Customers</div>
    <a href="/admin/bookings.html" class="admin-nav-item"><i class="bi bi-calendar-check"></i> Bookings</a>
    <a href="/admin/messages.html" class="admin-nav-item"><i class="bi bi-envelope"></i> Messages</a>
    <a href="/admin/trade-ins.html" class="admin-nav-item"><i class="bi bi-arrow-left-right"></i> Trade-Ins</a>
    <a href="/admin/finance.html" class="admin-nav-item active"><i class="bi bi-bank"></i> Finance Apps</a>
    <div class="admin-nav-section">System</div>
    <a href="/" target="_blank" class="admin-nav-item"><i class="bi bi-box-arrow-up-right"></i> View Website</a>
    <a href="#" class="admin-nav-item" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </nav>
  <div class="admin-sidebar-footer">
    <div class="admin-user"><div class="admin-user-avatar" id="userAvatarLetter">A</div><div class="admin-user-info"><div class="name" id="adminUsername">Admin</div><div class="role">Administrator</div></div></div>
  </div>
</aside>
<main class="admin-main">
  <div class="admin-topbar">
    <div style="display:flex;align-items:center;gap:1rem">
      <button class="btn btn-ghost btn-sm" id="sidebarToggle"><i class="bi bi-list" style="font-size:1.2rem"></i></button>
      <h1>Finance Applications</h1>
    </div>
  </div>
  <div class="admin-content">
    <div class="admin-card">
      <div class="admin-card-header"><h5>All Finance Applications (<span id="fiCount">...</span>)</h5><button class="btn btn-ghost btn-sm" onclick="loadFinance()"><i class="bi bi-arrow-clockwise"></i></button></div>
      <div style="overflow-x:auto">
        <table class="admin-table">
          <thead><tr><th>Ref</th><th>Applicant</th><th>Vehicle</th><th>Employment</th><th>Income</th><th>Deposit</th><th>Term</th><th>Status</th><th>Date</th></tr></thead>
          <tbody id="fiTableBody"><tr><td colspan="9" style="text-align:center;padding:3rem"><div class="spinner" style="margin:0 auto"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>
<script>
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = '/admin/login.html';
  const admin = JSON.parse(localStorage.getItem('adminUser') || '{}');
  if (admin.username) { document.getElementById('adminUsername').textContent = admin.username; document.getElementById('userAvatarLetter').textContent = admin.username[0].toUpperCase(); }
  document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); localStorage.removeItem('adminToken'); localStorage.removeItem('adminUser'); window.location.href = '/admin/login.html'; });
  document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('adminSidebar').classList.toggle('open'));

  async function loadFinance() {
    const res = await fetch('/api/bookings/finance-inquiries', { headers: { Authorization: 'Bearer ' + token } });
    const data = await res.json();
    document.getElementById('fiCount').textContent = data.data?.length || 0;
    const tbody = document.getElementById('fiTableBody');
    if (!data.data?.length) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:3rem;color:var(--gray-400)">No finance applications yet</td></tr>'; return; }
    tbody.innerHTML = data.data.map(f => `
      <tr>
        <td style="font-family:monospace;font-size:.8rem">FI-${String(f.id).padStart(5,'0')}</td>
        <td><div style="font-weight:600;font-size:.875rem">${f.first_name} ${f.last_name}</div><div style="font-size:.75rem;color:var(--gray-500)">${f.email}</div></td>
        <td style="font-size:.8rem">${f.make ? f.make+' '+f.model : '—'}</td>
        <td style="font-size:.8rem">${f.employment_type}</td>
        <td>R ${Number(f.monthly_income).toLocaleString()}</td>
        <td>R ${Number(f.deposit_amount||0).toLocaleString()}</td>
        <td>${f.loan_term} mo</td>
        <td><span class="status-badge status-${f.status}">${f.status}</span></td>
        <td style="font-size:.8rem">${new Date(f.created_at).toLocaleDateString()}</td>
      </tr>`).join('');
  }
  loadFinance();
</script>
</body>
</html>
